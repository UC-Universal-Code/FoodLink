name: foodlink
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Dependencias para seguridad y manejo de estado
  flutter_secure_storage: ^9.2.2  # Almacenamiento seguro de tokens
  dio: ^5.4.0                     # Cliente HTTP para peticiones al backend
  provider: ^6.1.1                # Manejo de estado

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true